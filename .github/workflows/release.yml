# Nome do Workflow
name: Build, Create Release and Publish

# Gatilho (Trigger)
on:
  push:
    branches:
      - main
    paths:
      - "public/manifest.json"

# Tarefas (Jobs)
jobs:
  build-and-release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Build the extension
        run: npm run build

      - name: Extract version from manifest.json
        id: get_version
        run: echo "version=$(jq -r .version public/manifest.json)" >> $GITHUB_OUTPUT

      - name: Create ZIP file name
        id: zip_name
        run: echo "name=FocoTotal-Extention-v${{ steps.get_version.outputs.version }}.zip" >> $GITHUB_OUTPUT

      - name: Zip built extension files
        run: |
          cd dist
          zip -r ../${{ steps.zip_name.outputs.name }} .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.zip_name.outputs.name }}
          tag_name: v${{ steps.get_version.outputs.version }}
          name: Release v${{ steps.get_version.outputs.version }}
          body: |
            Lançamento oficial da versão ${{ steps.get_version.outputs.version }} da extensão FocoTotal.
          draft: false
          prerelease: false

      # PASSO CORRIGIDO: Usando a versão estável da Action
      - name: Upload & Publish to Chrome Web Store
        uses: mnao305/chrome-extension-upload@v5.0.0
        with:
          file-path: ${{ steps.zip_name.outputs.name }}
          extension-id: ${{ secrets.CHROME_EXTENSION_ID }}
          client-id: ${{ secrets.CHROME_CLIENT_ID }}
          client-secret: ${{ secrets.CHROME_CLIENT_SECRET }}
          refresh-token: ${{ secrets.CHROME_REFRESH_TOKEN }}
          publish: true